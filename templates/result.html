<!DOCTYPE html>
<html>
<head>
    <title>Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
        }
        .card {
            margin-top: 30px;
            padding: 25px;
            border-radius: 20px;
        }
        img {
            border-radius: 10px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card shadow text-center">
        <h2>🎯 Prediction Result</h2>

        <h3>{{ result }}</h3>

        {% if prob %}
        <p><b>Confidence:</b> {{ prob }}</p>
        {% endif %}

        <img src="/static/shap.png" width="400">
    </div>

    <div class="card shadow">
        <h4>📊 Model Accuracy Comparison</h4>
        <img src="/static/accuracy.png" width="100%">
    </div>

    <div class="card shadow">
        <h4>📉 Confusion Matrix</h4>
        <img src="/static/confusion.png" width="100%">
    </div>

    <div class="card shadow">
        <h4>⭐ Feature Importance</h4>
        <img src="/static/importance.png" width="100%">
    </div>

    <br>
    <a href="/" class="btn btn-dark">Go Back</a>

</div>

</body>
</html>
